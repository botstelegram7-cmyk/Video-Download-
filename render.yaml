services:
  - type: web
    name: serena-downloader-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: OWNER_IDS
        value: "1598576202"
      - key: REACTIONS_ENABLED
        value: "true"
    healthCheckPath: /health
